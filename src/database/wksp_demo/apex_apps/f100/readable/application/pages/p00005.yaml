- # ====== Region: Search Results ==============================
  id: 10396260146088233
  identification: 
    name: Search Results
    type: Cards

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select "ORDER_ID",
             "ORDER_DATE",
             "ORDER_MODE",
             "CUSTOMER_ID",
             ( select l1."CUST_FIRST_NAME" from "OEHR_CUSTOMERS" l1 where l1."CUSTOMER_ID" = m."CUSTOMER_ID") "CUSTOMER_ID_L$1",
             "ORDER_STATUS",
             "ORDER_TOTAL",
             "SALES_REP_ID",
             ( select l2."FIRST_NAME" from "OEHR_EMPLOYEES" l2 where l2."EMPLOYEE_ID" = m."SALES_REP_ID") "SALES_REP_ID_L$2",
             "PROMOTION_ID"
      from "OEHR_ORDERS" m

  order-by: 
    type: Item
    item: 
      item-name: P5_ORDER_BY
      order-bys: 
      - key: CUSTOMER_ID_L$1
        clause: '"CUSTOMER_ID_L$1" asc'

      - key: ORDER_DATE
        clause: '"ORDER_DATE" asc'

      - key: ORDER_MODE
        clause: '"ORDER_MODE" asc'

  layout: 
    sequence: 20
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Cards Container
    template-options: 
    - '#DEFAULT#'
    - t-CardsRegion--hideHeader js-addHiddenHeadingRoleDesc
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    region-display-selector: false
    exclude-title-from-translation: false

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    id: 10400630677088244
    appearance: 
      layout: Grid
      grid-columns: Auto

    title: 
      advanced-formatting: false
      column: CUSTOMER_ID_L$1

    subtitle: 
      advanced-formatting: false

    body: 
      advanced-formatting: false
      column: ORDER_DATE

    secondary-body: 
      advanced-formatting: false

    icon-and-badge: 
      icon-source: Initials
      icon-column: CUSTOMER_ID_L$1
      icon-position: Start
      badge-column: ORDER_MODE

    media: 
      advanced-formatting: false
      source: No Media

    performance: 
      lazy-loading: false

    pagination: 
      type: Scroll
      show-total-count: false

